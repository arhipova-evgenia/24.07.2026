<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на юбилей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #f5af19, #f12711);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            text-align: center;
        }
        .card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        h1 span {
            display: block;
            font-size: 2rem;
            font-weight: 300;
            margin-top: 5px;
            color: #ffe082;
        }
        .date {
            font-size: 1.4rem;
            margin: 20px 0 10px;
            opacity: 0.9;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .countdown-item {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 15px 20px;
            min-width: 80px;
        }
        .countdown-item .number {
            font-size: 2.8rem;
            font-weight: 700;
            display: block;
            line-height: 1.2;
        }
        .countdown-item .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 16px 40px;
            background: #fff;
            color: #f12711;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #ffe082;
        }
        .address {
            margin-top: 25px;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .address a {
            color: #ffe082;
            text-decoration: underline;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="card">
<h1>Приглашаем вас</h1>
<h1>на юбилей!</h1>
<h2><span style="font-family: 'times new roman', times, serif; color: #ffb43c;"><span style="font-size: 24pt;"><strong>Архиповой</strong></span><span style="font-size: 24pt;"><strong> Евгении</strong></span><span style="font-size: 24pt;"><strong> Михайловны</strong></span></span></h2>
<p class="date"><strong>📅 24 июля 2026 года · 18:00</strong></p>
<p class="date">До встречи осталось:</p>
<!-- Таймер обратного отсчёта -->
<div class="countdown" id="countdown">
<div class="countdown-item"><span class="number" id="days">--</span> <span class="label">Дней</span></div>
<div class="countdown-item"><span class="number" id="hours">--</span> <span class="label">Часов</span></div>
<div class="countdown-item"><span class="number" id="minutes">--</span> <span class="label">Минут</span></div>
<div class="countdown-item"><span class="number" id="seconds">--</span> <span class="label">Секунд</span></div>
</div>
<!-- Кнопка-подтверждение (можно заменить на ссылку) --> <a href="#" class="btn" id="rsvpBtn">👍 Я приду!</a>
<div class="address">📍 Место встречи: <strong>Кафе "Динур", ул. Ильича, 6А</strong><br /><a href="https://yandex.ru/maps/-/CTQAnXlS" target="_blank" rel="noopener">Открыть карту</a></div>
<div class="footer">❤️ Ждём всех с хорошим настроением!</div>
</div>
<p>
<script>
    // Установите вашу дату (год, месяц-1, день, часы, минуты)
    const targetDate = new Date(2026, 6, 24, 18, 0, 0); // 24 июля 2026, 18:00

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate.getTime() - now;

        if (diff <= 0) {
            document.getElementById('days').textContent = '00';
            document.getElementById('hours').textContent = '00';
            document.getElementById('minutes').textContent = '00';
            document.getElementById('seconds').textContent = '00';
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('days').textContent = String(days).padStart(2, '0');
        document.getElementById('hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Кнопка "Я приду" (можно сделать ссылку на WhatsApp/Telegram или просто алерт)
    document.getElementById('rsvpBtn').addEventListener('click', function(e) {
        e.preventDefault();
        alert('Спасибо! Ждём вас 24 июля в 18:00 🎉');
        // Можно заменить на ссылку: window.location.href = 'https://wa.me/...';
    });
</script>
</p>
</body>
</html>
